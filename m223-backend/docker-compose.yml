services:
  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: m223
      MYSQL_USER: m223
      MYSQL_PASSWORD: m223
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pexample"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
